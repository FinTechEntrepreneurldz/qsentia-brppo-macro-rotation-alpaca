name: Alpaca Paper Rebalance

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13,14 * * 1-5"

jobs:
  paper-rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
      APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
      APCA_API_BASE_URL: ${{ secrets.APCA_API_BASE_URL || 'https://paper-api.alpaca.markets' }}
      ALPACA_DATA_FEED: ${{ vars.ALPACA_DATA_FEED || 'iex' }}
      QSENTIA_SUBMIT_ORDERS: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Test
        run: pytest

      - name: Paper rebalance
        run: PYTHONPATH=src python scripts/run_paper_rebalance.py --submit --market-time-gate

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qsentia-brppo-macro-alpaca-logs
          path: logs/

