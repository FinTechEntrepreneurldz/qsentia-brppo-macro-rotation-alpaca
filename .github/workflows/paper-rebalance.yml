name: Alpaca Paper Rebalance

on:
  workflow_dispatch:
    inputs:
      bypass_time_gate:
        description: "Submit immediately instead of requiring the 9 AM New York gate."
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 13,14 * * 1-5"

permissions:
  contents: write

jobs:
  paper-rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
      APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
      APCA_API_BASE_URL: ${{ secrets.APCA_API_BASE_URL || 'https://paper-api.alpaca.markets' }}
      ALPACA_DATA_FEED: ${{ vars.ALPACA_DATA_FEED || 'iex' }}
      QSENTIA_SUBMIT_ORDERS: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Test
        run: python -m pytest

      - name: Paper rebalance
        run: |
          if [ "${{ github.event.inputs.bypass_time_gate }}" = "true" ]; then
            PYTHONPATH=src python scripts/run_paper_rebalance.py --submit
          else
            PYTHONPATH=src python scripts/run_paper_rebalance.py --submit --market-time-gate
          fi

      - name: Commit dashboard logs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f logs
          if git diff --cached --quiet; then
            echo "No dashboard log changes to commit."
          else
            git commit -m "Update Alpaca paper dashboard logs"
            git push
          fi

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qsentia-brppo-macro-alpaca-logs
          path: logs/
